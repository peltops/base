---
- name: copy rabbitmq files
  copy:
    src: ../files/rabbitmq
    dest: /opt

- name: deploy/restart rabbitmq apps 
  community.docker.docker_compose_v2:
    project_src: /opt/rabbitmq
    files: 
      - "docker-compose.yaml"
    state: present
  register: output

- name: Show results
  ansible.builtin.debug:
    var: output

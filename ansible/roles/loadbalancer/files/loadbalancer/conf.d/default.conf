server {
  listen        80 default_server;
  server_name   _;
  server_tokens off;

  location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
  } 

  location /health {
      access_log off;
      return 200 "healthy\n";
  }
  
  location / {
      return 301 https://$host$request_uri;
  }  

}

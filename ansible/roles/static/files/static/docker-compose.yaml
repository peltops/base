services:
  static:
    container_name: static
    hostname: static
    image: dhi.io/nginx:1-debian13-dev
    restart: always
    ports:
     - 19080
     - 19443
    healthcheck:
      test: ["CMD", "pidof", "-s", "nginx"]
      interval: 60s
      retries: 5
      start_period: 20s
      timeout: 10s        
    networks:
      - backend
    volumes:
      - ./config:/etc/nginx/config
      - ./conf.d:/etc/nginx/conf.d
      - ./nginx.conf:/etc/nginx/nginx.conf
      - /opt/letsencrypt:/etc/letsencrypt:ro  
      - ./data:/var/www/static  
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"    

networks:
  backend:
    name: backend
    external: true
   
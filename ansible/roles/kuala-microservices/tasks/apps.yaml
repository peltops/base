---
- name: Copy kuala-microservices files
  copy:
    src: ../files/kuala-microservices
    dest: /opt

- name: Copy microservice directories
  copy:
    src: "{{ kuala_api_src_dir }}/services/{{ item }}"
    dest: "{{ kuala_microservices_dest_dir }}/{{ item }}"
  loop: "{{ microservices_list }}"

- name: Copy deno.json for each service
  copy:
    src: "{{ kuala_api_src_dir }}/deno.json"
    dest: "{{ kuala_microservices_dest_dir }}/{{ item }}/deno.json"
  loop: "{{ microservices_list }}"

- name: Copy deno.lock for each service
  copy:
    src: "{{ kuala_api_src_dir }}/deno.lock"
    dest: "{{ kuala_microservices_dest_dir }}/{{ item }}/deno.lock"
  loop: "{{ microservices_list }}"

- name: Copy shared library for each service
  copy:
    src: "{{ kuala_api_src_dir }}/supabase/functions/_shared"
    dest: "{{ kuala_microservices_dest_dir }}/{{ item }}/supabase/functions/_shared"
  loop: "{{ microservices_list }}"

- name: Deploy kuala-microservices apps 
  community.docker.docker_compose_v2:
    project_src: "{{ kuala_microservices_dest_dir }}"
    files: 
      - "docker-compose.yaml"
    state: present
  register: output

- name: Show results
  ansible.builtin.debug:
    var: output
